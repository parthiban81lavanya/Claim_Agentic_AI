name: Deploy AI System

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: claims-ai

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2) Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3) Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4) Run Tests (if you add pytest later)
      - name: Run Tests
        run: |
          echo "Running tests..."
          # pytest tests/

      # 5) Log in to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6) Build Docker Image
      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME .

      # 7) Tag Image
      - name: Tag Image
        run: docker tag $IMAGE_NAME ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest

      # 8) Push Image
      - name: Push Image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest