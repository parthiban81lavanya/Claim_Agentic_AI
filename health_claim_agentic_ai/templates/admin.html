<h2>Claims Requiring Human Approval</h2>

<table>
    <thead>
        <tr>
            <th>Claim ID</th>
            <th>Amount</th>
            <th>Fraud Score</th>
            <th>Decision</th>
        </tr>
    </thead>
    <tbody id="claims"></tbody>
</table>

<script>
let token = "";

// // function login() {

//     })
//     .then(res => res.json())

//         loadClaims();
//     });

function loadClaims() {
    fetch("/admin/review-claims", {
        headers: { "Authorization": token }
    })
    .then(res => res.json())
    .then(data => {
        let rows = "";
        data.forEach(c => {
            rows += `
                <tr>
                    <td>${c.id}</td>
                    <td>${c.amount}</td>
                    <td>${c.fraud_score}</td>
                    <td>
                        <button onclick="decide(${c.id}, 'APPROVE')">Approve</button>
                        <button onclick="decide(${c.id}, 'REJECT')">Reject</button>
                    </td>
                </tr>
            `;
        });
        document.getElementById("claims").innerHTML = rows;
    });
}

function decide(claimId, decision) {
    fetch("/admin/approve", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": token
        },
        body: JSON.stringify({
            claim_id: claimId,
            admin_id: 1,
            decision: decision,
            comments: "Reviewed by admin"
        })
    })
    .then(() => loadClaims());
}
</script>
